name: Deploy Secure Site to EdgeOne

on:
  push:
    branches:
      - main

# ==================== 新增：取消正在运行的前一次 workflow ====================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# =====================================================================

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-global-edgeone
          restore-keys: |
            ${{ runner.os }}-npm-global-

      - name: Install EdgeOne CLI
        run: |
          npm install -g edgeone
          edgeone --version

      # 【关键修改】智能部署 + 强制刷日志 + 确保日志一定显示
      - name: Deploy to EdgeOne (Smart Exit + Always Show Log)
        run: |
          LOG_FILE=$(mktemp)
          
          echo "🚀 Starting EdgeOne deployment..."
          
          # 使用 stdbuf 强制实时输出（解决日志不刷盘问题）
          stdbuf -oL -eL edgeone pages deploy ./ \
            --name "${{ secrets.EDGEONE_PROJECT_NAME }}" \
            --token "${{ secrets.EDGEONE_PAGES_TOKEN }}" \
            --force > "$LOG_FILE" 2>&1 &
          
          DEPLOY_PID=$!
          echo "📌 Deploy process started (PID: $DEPLOY_PID)"
          
          # 轮询检测（每秒检查一次）
          UPLOAD_DETECTED=false
          while kill -0 $DEPLOY_PID 2>/dev/null; do
            if grep -q "File uploaded successfully" "$LOG_FILE" 2>/dev/null; then
              UPLOAD_DETECTED=true
              echo "🎯 Detected 'File uploaded successfully', terminating process early..."
              kill $DEPLOY_PID 2>/dev/null || true
              break
            fi
            sleep 1
          done
          
          # 等待进程真正结束并获取退出码
          wait $DEPLOY_PID
          EXIT_CODE=$?
          
          echo ""
          echo "📋 === FULL DEPLOY LOG (always shown) ==="
          cat "$LOG_FILE"
          echo "📋 === END OF LOG ==="
          rm -f "$LOG_FILE"
          
          # 判断结果（保持你原来的逻辑）
          if [ "$UPLOAD_DETECTED" = true ]; then
            if [ $EXIT_CODE -eq 143 ] || [ $EXIT_CODE -eq 137 ] || [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Upload successful, process terminated early"
              exit 0
            fi
          fi
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Deploy completed naturally"
            exit 0
          else
            echo "❌ Deploy failed with exit code: $EXIT_CODE"
            exit $EXIT_CODE
          fi