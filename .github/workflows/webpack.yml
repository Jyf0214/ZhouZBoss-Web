name: Deploy Secure Site to EdgeOne

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-global-edgeone
          restore-keys: |
            ${{ runner.os }}-npm-global-

      - name: Install EdgeOne CLI
        run: |
          npm install -g edgeone
          edgeone --version

      # 【关键修改】智能部署：检测到上传成功后立即结束，否则等待完成
      - name: Deploy to EdgeOne (Smart Exit)
        run: |
          LOG_FILE=$(mktemp)
          
          echo "🚀 Starting EdgeOne deployment..."
          
          # 后台运行部署命令，输出到日志文件
          edgeone pages deploy ./ \
            --name "${{ secrets.EDGEONE_PROJECT_NAME }}" \
            --token "${{ secrets.EDGEONE_PAGES_TOKEN }}" \
            --force > "$LOG_FILE" 2>&1 &
          
          DEPLOY_PID=$!
          echo "📌 Deploy process started (PID: $DEPLOY_PID)"
          
          # 轮询检测：每秒检查一次日志
          UPLOAD_DETECTED=false
          while kill -0 $DEPLOY_PID 2>/dev/null; do
            if grep -q "File uploaded successfully" "$LOG_FILE" 2>/dev/null; then
              UPLOAD_DETECTED=true
              echo "🎯 Detected 'File uploaded successfully', terminating process..."
              kill $DEPLOY_PID
              break
            fi
            sleep 1
          done
          
          # 等待进程真正结束（获取退出码）
          wait $DEPLOY_PID
          EXIT_CODE=$?
          
          # 输出完整日志（便于调试）
          echo ""
          echo "📋 Deploy log:"
          cat "$LOG_FILE"
          rm -f "$LOG_FILE"
          
          # 判断结果：
          # - 如果检测到关键词（UPLOAD_DETECTED=true）且进程被杀死（143/137），算成功
          # - 如果进程自然结束（EXIT_CODE=0），算成功
          # - 否则算失败
          if [ "$UPLOAD_DETECTED" = true ]; then
            if [ $EXIT_CODE -eq 143 ] || [ $EXIT_CODE -eq 137 ]; then
              echo "✅ Upload successful, process terminated early as requested"
              exit 0
            fi
          fi
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Deploy completed naturally"
            exit 0
          else
            echo "❌ Deploy failed with exit code: $EXIT_CODE"
            exit $EXIT_CODE
          fi
