name: "JS/TS Continuous Integration"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# 避免重复的 CI 在同个 PR 上堆积运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' 

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Syntax & Lint Check (语法与风格校验)
        run: |
          npm run lint --if-present

      - name: Type Check (TypeScript 类型安全排查)
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          else
            echo "No tsconfig.json found. Skipping."
          fi

      - name: Build Check (构建与编译校验)
        run: |
          npm run build --if-present

      - name: Run Tests (单元测试验证)
        run: |
          npm run test --if-present

  # 新增：CI 失败时自动召回 AI 修复机制（不含 AI 的正常 CI 报错后，拉起 AI 修复器）
  auto-recall-ai-fixer:
    needs: ci-verification
    if: failure() && github.event_name == 'pull_request' # 仅在 PR 检查失败时运行
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # 允许在 PR 上评论
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Comment on PR to trigger Qwen Fixer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # 自动在 PR 留评，以 @qwen-code /fix 开头，从而激活 Solver 工作流
          gh pr comment "$PR_NUMBER" --body "@qwen-code /fix ⚠️ 自动化 CI 检查（构建/测试/类型/风格）未通过！请结合 CI 的报错日志，分析并修复代码中的 Bug 或测试问题，确保 CI 检查顺利通过。"