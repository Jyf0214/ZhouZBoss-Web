name: "Qwen Multi-Agent Autonomous Solver"

on:
  issues:
    types: [labeled] # 当 Issue 被贴上特定标签时触发
  issue_comment:
    types: [created] # 当有人在 Issue 下评论指派时触发

jobs:
  solve-issue:
    # 安全防护门禁（仅允许合作者及系统级 Bot 触发）
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'auto-fix') || 
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '@qwen-code /fix') && 
        (
          github.event.comment.author_association == 'OWNER' || 
          github.event.comment.author_association == 'MEMBER' || 
          github.event.comment.author_association == 'COLLABORATOR' ||
          github.event.comment.user.login == 'github-actions[bot]'
        )
      )
    
    runs-on: ubuntu-latest
    
    permissions:
      contents: write      # 用于向仓库推送修复分支
      issues: write        # 用于读取/回复/关闭 Issue
      pull-requests: write # 用于自动创建 Pull Request
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整 Git 历史，确保分支操作正常

      - name: Set up Environment (Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 安装 TypeScript 语言服务（用于 LSP 功能）
      - name: Install TypeScript Language Server for LSP Support
        run: |
          npm install -g typescript-language-server typescript

      - name: Install Qwen Code CLI Globally
        run: npm install -g @qwen-code/qwen-code@latest

      # 物理防线：注入本地 Git 钩子，绝对禁止直推主分支
      - name: Enforce Local Branch Protection (Git Hook Security)
        run: |
          mkdir -p .git/hooks
          cat << 'EOF' > .git/hooks/pre-push
          #!/bin/sh
          while read local_ref local_sha remote_ref remote_sha
          do
            if [ "$remote_ref" = "refs/heads/main" ] || [ "$remote_ref" = "refs/heads/master" ]; then
              echo "========================================================="
              echo " [SECURITY ERROR] Direct push to main/master is PROHIBITED!"
              echo "========================================================="
              exit 1
            fi
          done
          exit 0
          EOF
          chmod +x .git/hooks/pre-push

      # 安全恢复会话缓存（统一路径为 ~/.qwen）
      - name: Restore Qwen Secure Session Cache
        id: cache-qwen
        uses: actions/cache@v4
        with:
          path: ~/.qwen
          key: qwen-session-issue-${{ github.event.issue.number }}-${{ github.run_id }}
          restore-keys: |
            qwen-session-issue-${{ github.event.issue.number }}-

      # 配置读取：使用 cat 动态写入 Qwen 全局配置文件（包含 MCP 联网 Fetch）
      - name: Configure Qwen Settings
        run: |
          mkdir -p ~/.qwen
          cat << 'EOF' > ~/.qwen/settings.json
          ${{ secrets.QWEN_SETTINGS_JSON }}
          EOF

      # 创建 LSP 运行时配置
      - name: Create LSP Server Configuration
        run: |
          cat << 'EOF' > .lsp.json
          {
            "typescript": {
              "command": "typescript-language-server",
              "args": ["--stdio"],
              "extensionToLanguage": {
                ".ts": "typescript",
                ".tsx": "typescriptreact",
                ".js": "javascript",
                ".jsx": "javascriptreact"
              }
            }
          }
          EOF

      # 执行自愈式多 Agent 增量修复逻辑
      - name: Run Qwen Autonomous Loop with Session Persistence
        env:
          UNLIMITED_OPENAI_API_KEY: ${{ secrets.UNLIMITED_OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          EVENT_NAME: ${{ github.event_name }}
          # 提取评论内容，并本着环境隔离原则使用变量
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -o pipefail
          export NODE_PENDING_DEPRECATION=0
          export QWEN_CODE_UNATTENDED_RETRY=1
          export QWEN_CODE_SUPPRESS_YOLO_WARNING=1
          
          # 初始化自愈与重试控制参数（最大尝试5次）
          MAX_ATTEMPTS=5
          ATTEMPT=1
          SUCCESS=false
          TRIGGER_COMPRESSION=false
          
          # 1. 物理分支感知与同步（解决分支落后与冲突问题）
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            PR_BRANCH=$(gh pr view "$ISSUE_NUMBER" --json headRefName --jq .headRefName 2>/dev/null || echo "fix/issue-$ISSUE_NUMBER")
            echo "Successfully detected active PR branch: $PR_BRANCH"
            
            git fetch origin "$PR_BRANCH"
            git checkout "$PR_BRANCH"
            
            # 自动同步主分支最新代码
            git fetch origin main
            echo "Attempting to merge origin/main into $PR_BRANCH to keep it updated..."
            if git merge origin/main --no-edit; then
              echo "Successfully merged origin/main into $PR_BRANCH (No conflicts)"
            else
              echo "::warning:: Merge conflict detected. Leaving conflict markers for Qwen to resolve."
            fi
          else
            PR_BRANCH="fix/issue-$ISSUE_NUMBER"
            echo "First-run or Issue trigger. Target branch initialized to: $PR_BRANCH"
          fi
          
          # 2. 判断并获取持久化的 Session ID
          mkdir -p ~/.qwen
          if [ -f ~/.qwen/current_session_id.txt ]; then
            SESSION_ID=$(cat ~/.qwen/current_session_id.txt)
            IS_RESUME=true
            echo "Successfully loaded persistent Session ID: $SESSION_ID (Incremental Mode)"
          else
            SESSION_ID=$(cat /proc/sys/kernel/random/uuid)
            echo "$SESSION_ID" > ~/.qwen/current_session_id.txt
            IS_RESUME=false
            echo "Created brand new Session ID: $SESSION_ID (First-run Mode)"
          fi
          
          # 3. 将 Issue 富文本安全写入本地工作区（避免任意 Shell 语法或 YAML 嵌套解析冲突）
          echo "# Issue #$ISSUE_NUMBER: $ISSUE_TITLE" > issue_details.md
          echo "" >> issue_details.md
          echo "$ISSUE_BODY" >> issue_details.md
          
          # 4. 安全构建 Prompt 临时文件
          > prompt.txt
          
          if [ "$IS_RESUME" = "true" ] && [ "$EVENT_NAME" = "issue_comment" ]; then
            # 清理指派标志
            USER_FEEDBACK=$(echo "$COMMENT_BODY" | sed 's/^@qwen-code \/fix//g' | xargs)
            
            echo "/goal 收到用户最新的评审反馈，请在当前会话和现有分支上继续完善代码。" >> prompt.txt
            echo "" >> prompt.txt
            echo "## 用户最新的修改要求：" >> prompt.txt
            echo "$USER_FEEDBACK" >> prompt.txt
            echo "" >> prompt.txt
            echo "## 执行流程：" >> prompt.txt
            echo "1. 你当前已经处于该 PR 的源本地分支 '$PR_BRANCH'。请直接在此分支上继续调整和修改。" >> prompt.txt
            echo "2. **冲突解决（Conflict Resolution）**：如果在上一步的 Git 合并中，工作区文件里包含冲突标记（如 '<<<<<<< HEAD'、'======='、'>>>>>>>'），你必须优先手动编辑这些文件，清除冲突标记，并合并双方的代码逻辑。" >> prompt.txt
            echo "3. 修改或解决冲突后，必须运行本地单元测试并通过验收（验收失败需继续修改）。" >> prompt.txt
            echo "4. 提交新的 commit 并直接推送到 origin '$PR_BRANCH'。此时远程 Pull Request 会自动更新，你【绝对不要】重复调用 'gh pr create' 创建新 PR（如果系统检测到该命令，请直接跳过）。" >> prompt.txt
            echo "5. 任务完成后，调用 'gh issue comment' 生动地回复用户，并说明此次增量修改的内容。" >> prompt.txt
          else
            # 【清单销项大 Goal 设计】：物理约束，杜绝幻觉与敷衍
            echo "/goal 仔细阅读本地文件 'issue_details.md'，提取并完全修复里面描述的【所有】高危和中危漏洞，绝对不允许遗漏任何一个！" >> prompt.txt
            echo "" >> prompt.txt
            echo "## 【执行与验收强制规范】：" >> prompt.txt
            echo "1. **建立物理销项清单**：作为你的第一步，请在工作区新建一个 'todo_checklist.md'。将 'issue_details.md' 中提及的所有需要修复的 Bug/漏洞（如 C1, C2, H1, H2, M1 等等）完整提取出来，列成一个带有 '[ ]' 的任务清单。" >> prompt.txt
            echo "2. **逐个修改与销项**：对于清单中的每一个任务，利用 LSP 精准分析代码，进行文件修改与本地单元测试。每修复成功并验证通过一个，就将清单中对应的 '[ ]' 改为 '[x]'。" >> prompt.txt
            echo "3. **物理审查防线（Judge 判定终态硬红线）**：" >> prompt.txt
            echo "   - 裁判模型（Judge）在进行 Goal Check 时，必须强制读取 'todo_checklist.md' 并且比对 'git diff' 的修改变动。" >> prompt.txt
            echo "   - **判定已达成（Goal Met）的前提条件为：清单中列出的所有安全隐患和 Bug 已全部被物理修改，且全部被标记为 '[x]'，且单元测试全绿通过**。" >> prompt.txt
            echo "   - 严禁“只修复其中一个或一部分就宣布结束”的敷衍行为！若存在未修复的漏洞或有未打勾项，必须判定为【未达成（Goal Not Met）】，并明确指示 Agent 接下来去修复哪一个具体的未打勾漏洞。" >> prompt.txt
            echo "4. **提交代码与PR**：全部勾选完毕并测试通过后，commit 提交修改，推送至远程分支并开 PR。" >> prompt.txt
            echo "5. **自主生动回复（消除人机感要求）**：" >> prompt.txt
            echo "   - PR 创建成功后，使用 'gh issue comment $ISSUE_NUMBER' 回复此 Issue。" >> prompt.txt
            echo "   - 回复语言必须生动、活泼，富有开发者温度。不要用机器官腔，多用 Emoji（如 🚀, 🤖, ✨, 🛠️）。" >> prompt.txt
            echo "   - 包含：欢快的打招呼与自我介绍、你是怎么排查到这些 Bug 的（结合 todo_checklist.md 逐项通俗解释修复点）、你的修复思路，以及附上生成的 PR 链接。" >> prompt.txt
            echo "" >> prompt.txt
            echo "## 安全限制：" >> prompt.txt
            echo "- 严禁直接向主分支（main/master）提交 commit 或执行 push 操作。" >> prompt.txt
          fi
          
          # 从 prompt.txt 读取内容（在双引号内通过 cat 传递，绝不发生 Shell 敏感字符重解析）
          FINAL_PROMPT="$(cat prompt.txt)"
          
          # 弹性恢复指令，同样必须作为参数传递，确保在断点启动时不进入阻塞状态
          RESUME_PROMPT="由于网络或上下文限制中断，请读取会话历史并继续完成所有步骤。请注意：必须对照 todo_checklist.md 继续修复未打勾的项，在本地运行并成功通过单元测试，确认无误后完成代码提交与 PR 处理。最后通过 gh issue comment 提交生动活泼的说明回复。"
          
          echo "Starting Qwen Agent Core Loop..."
          START_TIME=$(date +%s)
          
          # 3. 首次或恢复启动分流（注意：两个分支都带有参数，恢复路径使用 --resume 并携带指令）
          if [ "$IS_RESUME" = "true" ]; then
            echo "Executing in RESUME mode using --resume with prompt..."
            if qwen -y --experimental-lsp --max-session-turns 100 --max-tool-calls -1 --resume "$SESSION_ID" "$FINAL_PROMPT" 2>&1 | tee qwen_output.log; then
              SUCCESS=true
            else
              END_TIME=$(date +%s)
              DURATION=$((END_TIME - START_TIME))
              echo "::warning:: 运行中断。单次耗时: ${DURATION} 秒。"
              if [ $DURATION -ge 1200 ] || grep -q -E "524|terminated|closed" qwen_output.log; then
                TRIGGER_COMPRESSION=true
              fi
            fi
          else
            echo "Executing in INITIAL mode using --session-id with prompt..."
            if qwen -y --experimental-lsp --max-session-turns 100 --max-tool-calls -1 --session-id "$SESSION_ID" "$FINAL_PROMPT" 2>&1 | tee qwen_output.log; then
              SUCCESS=true
            else
              END_TIME=$(date +%s)
              DURATION=$((END_TIME - START_TIME))
              echo "::warning:: 运行中断。单次耗时: ${DURATION} 秒。"
              if [ $DURATION -ge 1200 ] || grep -q -E "524|terminated|closed" qwen_output.log; then
                TRIGGER_COMPRESSION=true
              fi
            fi
          fi
          
          # 弹性自愈断点续传循环（在自愈尝试期间，每次也都传递 $RESUME_PROMPT 指令防止 Headless 阻塞）
          while [ "$SUCCESS" = false ] && [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "=========================================="
            echo "正在启动自愈流程 (Attempt $ATTEMPT/$MAX_ATTEMPTS)..."
            echo "=========================================="
            sleep 15
            
            # 判定并执行分步压缩命令
            if [ "$TRIGGER_COMPRESSION" = true ]; then
              if [ "$ATTEMPT" = 2 ]; then
                echo "【Attempt 2 自愈】分步执行快速规则压缩 /compress-fast..."
                qwen -y --experimental-lsp --max-session-turns 100 --max-tool-calls -1 --resume "$SESSION_ID" "/compress-fast" || echo "Warning: /compress-fast 失败"
              elif [ "$ATTEMPT" -ge 3 ]; then
                echo "【Attempt $ATTEMPT 自愈】分步执行双重压缩：/compress-fast 紧跟 /compress..."
                qwen -y --experimental-lsp --max-session-turns 100 --max-tool-calls -1 --resume "$SESSION_ID" "/compress-fast" || echo "Warning: /compress-fast 失败"
                sleep 5
                qwen -y --experimental-lsp --max-session-turns 100 --max-tool-calls -1 --resume "$SESSION_ID" "/compress" || echo "Warning: /compress 失败"
              fi
            fi
            
            # 弹性恢复（在位置参数中显式传递恢复提示词，物理阻断交互输入等待）
            START_TIME=$(date +%s)
            if qwen -y --experimental-lsp --max-session-turns 100 --max-tool-calls -1 --resume "$SESSION_ID" "$RESUME_PROMPT" 2>&1 | tee qwen_output.log; then
              SUCCESS=true
              echo "自愈成功，任务已顺利完成。"
            else
              END_TIME=$(date +%s)
              DURATION=$((END_TIME - START_TIME))
              echo "::warning:: 第 $ATTEMPT 次尝试失败。单次耗时: ${DURATION} 秒。"
              if [ $DURATION -ge 1200 ] || grep -q -E "524|terminated|closed" qwen_output.log; then
                TRIGGER_COMPRESSION=true
              fi
            fi
          done
          
          # 最终成功状态判定
          if [ "$SUCCESS" = false ]; then
            echo "Error: Qwen Autonomous execution failed to complete and verify the task."
            exit 1
          fi