name: "Qwen Autonomous Issue Solver"

on:
  issues:
    types: [labeled] # 当 Issue 被贴上特定标签时触发
  issue_comment:
    types: [created] # 当有人在 Issue 下评论指派时触发

jobs:
  solve-issue:
    # 触发条件：Issue 贴了 'auto-fix' 标签，或评论开头为 '@qwen-code /fix'
    if: |
      github.event.label.name == 'auto-fix' || 
      (github.event.comment && startsWith(github.event.comment.body, '@qwen-code /fix'))
    
    runs-on: ubuntu-latest
    
    permissions:
      contents: write      # 用于向仓库推送修复分支
      issues: write        # 用于读取/回复/关闭 Issue
      pull-requests: write # 用于自动创建 Pull Request
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整 Git 历史，确保分支操作正常

      - name: Set up Environment (Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Qwen Code CLI Globally
        run: npm install -g @qwen-code/qwen-code@latest

      # 关键步骤 1：物理防线 - 注入本地 Git 钩子阻止直推主分支
      - name: Enforce Local Branch Protection (Git Hook Security)
        run: |
          mkdir -p .git/hooks
          cat << 'EOF' > .git/hooks/pre-push
          #!/bin/sh
          # 提取即将推送的目标分支名称
          while read local_ref local_sha remote_ref remote_sha
          do
            if [ "$remote_ref" = "refs/heads/main" ] || [ "$remote_ref" = "refs/heads/master" ]; then
              echo "========================================================="
              echo " [SECURITY ERROR] Direct push to main/master is PROHIBITED!"
              echo "========================================================="
              exit 1
            fi
          done
          exit 0
          EOF
          chmod +x .git/hooks/pre-push

      # 关键步骤 2：配置读取 - 使用 cat 动态写入 Qwen 全局配置文件
      - name: Configure Qwen Settings
        run: |
          mkdir -p ~/.qwen
          cat << 'EOF' > ~/.qwen/settings.json
          ${{ secrets.QWEN_SETTINGS_JSON }}
          EOF

      # 关键步骤 3：执行自主修复及 PR 开设
      - name: Run Qwen Autonomous Goal Loop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          QWEN_CODE_SUPPRESS_YOLO_WARNING=1
        run: |
          # 开启无监督异常重试机制
          export QWEN_CODE_UNATTENDED_RETRY=1
          
          # 在指令中明确增加“严格限制（STRICT CONSTRAINTS）”
          qwen -p "
          /goal 分析 #${{ env.ISSUE_NUMBER }} 号 Issue 描述的问题。
          - 标题: ${{ env.ISSUE_TITLE }}
          - 详情: ${{ env.ISSUE_BODY }}
          
          ## 核心任务步骤：
          1. 阅读相关代码，寻找原因。
          2. 基于当前主分支切出新分支 'fix/issue-${{ env.ISSUE_NUMBER }}'。
          3. 修改代码并运行项目的单元测试（根据检测到的技术栈执行对应测试指令），确保修复有效。
          4. 本地 commit 提交修改（符合 Conventional Commits 规范，结尾附加 'Closes #${{ env.ISSUE_NUMBER }}'）。
          5. 将新分支推送到 GitHub。
          6. 使用内置工具（如 gh 命令行客户端）在 GitHub 上自动创建一个 PR 目标指向主分支。
          
          ## 严格限制与安全红线（STRICT SECURITY CONSTRAINTS）：
          - 严禁直接向主分支（main 或 master）提交任何 commit！
          - 严禁向主分支（main 或 master）执行 push 操作！
          - 所有代码修改必须在本地新建的 'fix/issue-${{ env.ISSUE_NUMBER }}' 分支上进行，并且必须通过 Pull Request 方式请求合并。如果尝试直推主分支，本地 Git 钩子将强制报错。
          " -y