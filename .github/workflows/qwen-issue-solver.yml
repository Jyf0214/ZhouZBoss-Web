name: "Qwen Multi-Agent Autonomous Solver"

on:
  issues:
    types: [labeled] # 当 Issue 被贴上特定标签时触发
  issue_comment:
    types: [created] # 当有人在 Issue 下评论指派时触发

jobs:
  solve-issue:
    # 触发条件：Issue 贴了 'auto-fix' 标签，或评论开头为 '@qwen-code /fix'
    if: |
      github.event.label.name == 'auto-fix' || 
      (github.event.comment && startsWith(github.event.comment.body, '@qwen-code /fix'))
    
    runs-on: ubuntu-latest
    
    permissions:
      contents: write      # 用于向仓库推送修复分支
      issues: write        # 用于读取/回复/关闭 Issue
      pull-requests: write # 用于自动创建 Pull Request
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整 Git 历史，确保分支操作正常

      - name: Set up Environment (Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 新增 LSP 底座安装：安装 TypeScript 语言服务
      - name: Install TypeScript Language Server for LSP Support
        run: |
          npm install -g typescript-language-server typescript

      - name: Install Qwen Code CLI Globally
        run: npm install -g @qwen-code/qwen-code@latest

      # 物理防线：注入本地 Git 钩子，绝对禁止直推主分支
      - name: Enforce Local Branch Protection (Git Hook Security)
        run: |
          mkdir -p .git/hooks
          cat << 'EOF' > .git/hooks/pre-push
          #!/bin/sh
          while read local_ref local_sha remote_ref remote_sha
          do
            if [ "$remote_ref" = "refs/heads/main" ] || [ "$remote_ref" = "refs/heads/master" ]; then
              echo "========================================================="
              echo " [SECURITY ERROR] Direct push to main/master is PROHIBITED!"
              echo "========================================================="
              exit 1
            fi
          done
          exit 0
          EOF
          chmod +x .git/hooks/pre-push

      # 配置读取：使用 cat 动态写入 Qwen 全局配置文件
      - name: Configure Qwen Settings
        run: |
          mkdir -p ~/.qwen
          cat << 'EOF' > ~/.qwen/settings.json
          ${{ secrets.QWEN_SETTINGS_JSON }}
          EOF

      # 新增 LSP 运行时配置：动态创建 .lsp.json 文件
      - name: Create LSP Server Configuration
        run: |
          cat << 'EOF' > .lsp.json
          {
            "typescript": {
              "command": "typescript-language-server",
              "args": ["--stdio"],
              "extensionToLanguage": {
                ".ts": "typescript",
                ".tsx": "typescriptreact",
                ".js": "javascript",
                ".jsx": "javascriptreact"
              }
            }
          }
          EOF

      # 核心执行步骤：自愈式、带 LSP 语义分析、级联压缩与质量验收的工作流
      - name: Run Qwen Multi-Agent Loop with LSP
        env:
          UNLIMITED_OPENAI_API_KEY: ${{ secrets.UNLIMITED_OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 开启 pipefail 确保 tee 不会吞掉真实命令的退出状态
          set -o pipefail
          
          # 优化 Node.js 相关的网络生命周期，减小 Socket 意外中断概率
          export NODE_PENDING_DEPRECATION=0
          export QWEN_CODE_UNATTENDED_RETRY=1
          export QWEN_CODE_SUPPRESS_YOLO_WARNING=1
          
          # 为当前 Issue 分配固定的 Session ID 以支持断点续传
          SESSION_ID="issue-solver-session-${{ env.ISSUE_NUMBER }}"
          
          # 初始化自愈式重试控制参数
          MAX_ATTEMPTS=4
          ATTEMPT=1
          SUCCESS=false
          TRIGGER_COMPRESSION=false
          
          # 纯原生内置功能的 Prompt
          PROMPT="
          /goal 解决 #${{ env.ISSUE_NUMBER }} 号 Issue 描述的问题。
          - 标题: ${{ env.ISSUE_TITLE }}
          - 详情: ${{ env.ISSUE_BODY }}
          
          ## 核心流程（仅使用项目内置能力）：
          1. **语义定位**：请充分利用底座已经连接的 '--experimental-lsp' 语言服务进行精准的语义代码跳转和跳转到定义，提高重构与查找引用效率，减少无意义的全局文本扫描。
          2. **代码库分析**：如需深入分析或检索代码库文件，请灵活调用内置子智能体 (subagent_type: 'Explore') 以节省你的上下文。
          3. **修复代码**：直接使用你的文件读写工具（或分发给内置 'general-purpose' 子智能体）来编辑修改受影响的代码。
          4. **严格质量验收（核心红线）**：
             - 编写或修改代码后，**绝不能直接 Commit**。
             - 你必须通过内置终端工具运行该项目本就存在的本地测试命令（如 pytest, npm run test 或对应语言的构建/校验命令）。
             - 只有确保测试命令 100% 成功通过、没有任何报错时，才能视修改为成功。
             - 如果测试未通过，请根据测试日志打回重修，直至验收通过。
          5. **代码提交与开 PR**：
             - 基于当前最新主分支切出新分支 'fix/issue-${{ env.ISSUE_NUMBER }}'。
             - 在新分支上提交符合 Conventional Commits 规范的 Commit（结尾附带 'Closes #${{ env.ISSUE_NUMBER }}'）。
             - 将分支推送至 GitHub，并直接调用系统内置的 'gh' 客户端在云端发起 PR。
          
          ## 安全限制：
          - 严禁直接向主分支（main/master）提交 commit 或执行 push 操作。
          "
          
          echo "Starting Qwen Autonomous Loop with LSP..."
          
          START_TIME=$(date +%s)
          
          # 第一次尝试运行（注意：这里追加了 --experimental-lsp 参数，并移除了 -p 参数）
          if qwen -y --experimental-lsp --session-id "$SESSION_ID" "$PROMPT" 2>&1 | tee qwen_output.log; then
            SUCCESS=true
          else
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            echo "::warning:: 首次运行中断。单次耗时: ${DURATION} 秒。"
            
            # 判定条件：如果运行了20分钟以上，或者日志包含 "524"、"terminated"、"closed"
            if [ $DURATION -ge 1200 ] || grep -q -E "524|terminated|closed" qwen_output.log; then
              echo "::warning:: 检测到 524 超时或运行超过20分钟，在下一次重试前将应用压缩逻辑。"
              TRIGGER_COMPRESSION=true
            fi
          fi
          
          # 弹性自愈循环
          while [ "$SUCCESS" = false ] && [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "=========================================="
            echo "正在启动自愈流程 (Attempt $ATTEMPT/$MAX_ATTEMPTS)..."
            echo "=========================================="
            sleep 15
            
            # 判定并执行分步压缩命令（追加了 --experimental-lsp，移除了 -p 标志）
            if [ "$TRIGGER_COMPRESSION" = true ]; then
              if [ "$ATTEMPT" = 2 ]; then
                echo "【Attempt 2 自愈】分步执行快速规则压缩 /compress-fast..."
                qwen -y --experimental-lsp --session-id "$SESSION_ID" "/compress-fast" || echo "Warning: /compress-fast 失败，尝试继续任务"
              elif [ "$ATTEMPT" -ge 3 ]; then
                echo "【Attempt $ATTEMPT 自愈】分步执行双重压缩：/compress-fast 紧跟 /compress..."
                qwen -y --experimental-lsp --session-id "$SESSION_ID" "/compress-fast" || echo "Warning: /compress-fast 失败"
                sleep 5
                qwen -y --experimental-lsp --session-id "$SESSION_ID" "/compress" || echo "Warning: /compress 失败"
              fi
            fi
            
            # 续传指令（追加了 --experimental-lsp，移除了 -p 标志）
            RESUME_PROMPT="由于网络或上下文限制中断，请读取会话历史并继续完成所有步骤。请注意：必须在本地运行并成功通过项目自身的单元测试，确认无误后方可推送分支并创建 PR。"
            
            START_TIME=$(date +%s)
            if qwen -y --experimental-lsp --session-id "$SESSION_ID" "$RESUME_PROMPT" 2>&1 | tee qwen_output.log; then
              SUCCESS=true
              echo "自愈成功，任务已顺利完成。"
            else
              END_TIME=$(date +%s)
              DURATION=$((END_TIME - START_TIME))
              echo "::warning:: 第 $ATTEMPT 次尝试失败。单次耗时: ${DURATION} 秒。"
              
              # 重新评估下一次重试是否需要应用/继续应用压缩策略
              if [ $DURATION -ge 1200 ] || grep -q -E "524|terminated|closed" qwen_output.log; then
                TRIGGER_COMPRESSION=true
              fi
            fi
          done
          
          # 最终成功状态判定
          if [ "$SUCCESS" = false ]; then
            echo "Error: Qwen Autonomous execution failed to complete and verify the task after $MAX_ATTEMPTS attempts."
            exit 1
          fi